---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: es-homeassistant
  namespace: es-somethingelse
spec:
  interval: 15m
  chart:
    spec:
      chart: external-service
      version: 15.2.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    service:
      main:
        type: ExternalIP
        loadBalancerIP: "10.42.1.11"
        useSlice: false
        ports:
          main:
            protocol: http
            port: 8123
    ingress:
      main:
        annotations:
          traefik.frontend.passHostHeader: "false"
        enabled: true
        hosts:
          - host: "homeassistant.test.arneklein.net"
            paths:
              - path: "/"
                pathType: "Prefix"
        integrations:
          certManager:
            certificateIssuer: "cloudflare"
            enabled: true
